services:
  yt-auto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-auto
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
    volumes:
      - ./data/runtime:/data/runtime
      - ./secrets:/data/secrets
    command:
      - python
      - scripts/auto_publish_scheduler.py
      - --project-root
      - /app
      - --runtime-dir
      - /data/runtime
      - --client-secrets
      - /data/secrets/client_secret.json
      - --token-file
      - /data/secrets/youtube_token.json
      - --api-keys-file
      - /data/secrets/gemini_keys.txt
      - --timezone
      - Asia/Kolkata
      - --schedule-slots
      - 11:30,17:30,19:30
      - --wake-before-minutes
      - "30"
      - --youtube-privacy
      - public
      - --branch-crawl-speed
      - fast
